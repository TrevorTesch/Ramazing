<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/Ramazing/css/home.css" />
  <link rel="stylesheet" href="/Ramazing/css/themes.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/Ramazing/assets/imgs/icons/pages/home.png" />
  <title>Home</title>
  <!-- Themes.JS-->
  <style>
    #latest-update-box {
      margin-top: 30px;
      width: 100%;
      max-width: 500px;
    }

    .update-card {
      background: rgba(102, 126, 234, 0.1);
      border: 2px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      backdrop-filter: blur(10px);
    }

    .update-card h3 {
      color: #667eea;
      margin: 0 0 10px 0;
      font-size: 1.1em;
    }

    .update-card p {
      color: rgba(255, 255, 255, 0.8);
      margin: 8px 0;
      font-size: 0.95em;
    }

    .update-date {
      font-size: 0.85em !important;
      color: rgba(255, 255, 255, 0.6) !important;
    }

    .update-card a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-top: 10px;
      transition: color 0.3s ease;
    }

    .update-card a:hover {
      color: #764ba2;
    }
  </style>
</head>

<body>
  <div class="background-animated"></div>

  <img src="/Ramazing/assets/imgs/icons/plain_logo.webp" alt="Shadow Logo">
  <h1>Shadow</h1>
  <p>discord.gg/goshadow</p>

  <div id="latest-update-box"></div>

  <script src="/Ramazing/assets/js/newsletter.js"></script>
</body>
</html>
