<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter - Ramazing Browser</title>
    <link rel="stylesheet" href="/css/themes.css" />
    <script src="/assets/js/themes.js" type="module"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .newsletter-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .newsletter-header h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .announcement-content {
            font-size: 1.1em;
            opacity: 0.9;
            line-height: 1.6;
        }

        .newsletter-updates {
            padding: 40px;
        }

        .newsletter-updates h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        .update-item {
            background: #f9f9f9;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .update-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .update-item h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .update-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.9em;
            color: #666;
        }

        .badge {
            background: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .update-item p:last-child {
            color: #555;
            line-height: 1.6;
            font-size: 1em;
        }

        .back-button {
            display: inline-block;
            margin: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }

        .back-button:hover {
            background: #764ba2;
        }

        @media (max-width: 768px) {
            .newsletter-header h1 {
                font-size: 1.8em;
            }

            .newsletter-updates {
                padding: 20px;
            }

            .update-item {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="history.back()">← Back</button>
    
    <div class="container">
        <div id="newsletter-content"></div>
    </div>

    <script src="/assets/js/newsletter.js"></script>
    <script>
        // Display full newsletter when page loads
        window.addEventListener('DOMContentLoaded', () => {
            newsletter.displayFullNewsletter();
        });
    </script>
</body>
</html>
